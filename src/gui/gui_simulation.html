<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA Visualizer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

    :root {
      --bg: #f7f9fc;
      --surface: #ffffff;
      --border: #dce4ed;
      --text: #1a2733;
      --text-dim: #7a90a4;
      --blue: #2563eb;
      --blue-lt: #eff4ff;
      --blue-dim: #c7d7f9;
      --accent: #1d4ed8;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr 44px;
      grid-template-columns: 1fr 260px;
      grid-template-areas:
        "header header"
        "canvas sidebar"
        "footer footer";
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .logo span {
      color: var(--blue);
    }

    .header-stats {
      display: flex;
      gap: 28px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    /* ── CANVAS AREA ── */
    .canvas-area {
      grid-area: canvas;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    #grid-canvas {
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(37, 99, 235, 0.07);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 5px;
      padding: 10px;
      text-align: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.7;
    }

    .drop-zone:hover,
    .drop-zone.over {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-lt);
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
    }

    .btn-row .btn {
      flex: 1;
    }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 5px;
      transition: all 0.12s;
    }

    .btn:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-lt);
    }

    .btn.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Sliders */
    .slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10px;
    }

    .slider-name {
      color: var(--text-dim);
    }

    .slider-val {
      color: var(--text);
      font-weight: 500;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--blue);
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--blue);
    }

    /* Legend */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .legend-gradient {
      height: 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
    }

    .swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .swatch {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .swatch-dot {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      border: 1px solid var(--border);
    }

    /* Iteration list */
    .iter-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .iter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 18px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      transition: background 0.1s;
      border-left: 2px solid transparent;
    }

    .iter-item:hover {
      background: var(--bg);
    }

    .iter-item.active {
      background: var(--blue-lt);
      border-left-color: var(--blue);
      padding-left: 16px;
    }

    .iter-num {
      color: var(--text-dim);
      width: 26px;
      flex-shrink: 0;
    }

    .iter-bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .iter-bar {
      height: 100%;
      background: var(--blue-dim);
      border-radius: 2px;
    }

    .iter-item.active .iter-bar {
      background: var(--blue);
    }

    .iter-time {
      color: var(--text-dim);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── GRAPH SVG ── */
    #graph-svg {
      display: none;
      width: 100%;
      height: 100%;
    }

    .g-edge {
      stroke: var(--border);
      stroke-width: 1.5px;
      transition: stroke 0.2s;
    }

    .g-node circle {
      stroke: var(--blue);
      stroke-width: 1.5px;
      cursor: pointer;
      transition: r 0.15s;
    }

    .g-node text {
      font-family: var(--mono);
      font-size: 9px;
      fill: var(--text);
      pointer-events: none;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    /* ── FOOTER ── */
    footer {
      grid-area: footer;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .playhead {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .playhead-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      pointer-events: none;
    }

    .playhead-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue);
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--blue);
      pointer-events: none;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">ca<span>/</span>visualizer</div>
    <div class="header-stats">
      <div class="stat"><span class="stat-label">Iterations</span><span class="stat-value" id="stat-iters">—</span>
      </div>
      <div class="stat"><span class="stat-label">Total</span><span class="stat-value" id="stat-total">—</span></div>
      <div class="stat"><span class="stat-label">ms / iter</span><span class="stat-value" id="stat-per">—</span></div>
      <div class="stat"><span class="stat-label">Grid</span><span class="stat-value" id="stat-size">—</span></div>
    </div>
  </header>

  <main class="canvas-area">
    <div id="empty-state" style="
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 12px;
  pointer-events: none;
">
      <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M3 7h18M3 12h18M3 17h18M7 3v18M12 3v18M17 3v18" stroke-opacity="0.4" />
      </svg>
      Load a JSON or gzip file to start
    </div>
    <canvas id="grid-canvas" style="display:none"></canvas>
    <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </main>

  <aside class="sidebar">

    <div class="section">
      <div class="section-title">Load</div>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        Drop performance JSON or gzip<br>or click to browse
      </div>
      <input type="file" id="file-input" accept=".json,.gz" style="display:none">
    </div>

    <div class="section">
      <div class="section-title">Playback</div>
      <div class="controls">
        <div class="btn-row">
          <button class="btn primary" id="btn-play" onclick="togglePlay()">▶ Play</button>
          <button class="btn" onclick="stepBy(-1)">◀</button>
          <button class="btn" onclick="stepBy(1)">▶</button>
          <button class="btn" onclick="reset()">↺</button>
        </div>
        <div class="slider-wrap">
          <div class="slider-header"><span class="slider-name">Speed</span><span class="slider-val" id="speed-label">15
              fps</span></div>
          <input type="range" min="1" max="60" value="15" oninput="setSpeed(this.value)">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Legend</div>
      <div class="legend" id="legend">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">Load data to see legend</span>
      </div>
    </div>

    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="section-title" style="padding:12px 18px 6px;flex-shrink:0;">Iterations</div>
      <div class="iter-scroll" id="iter-list"></div>
    </div>

  </aside>

  <footer>
    <span id="footer-left">- · -</span>
    <div class="playhead" id="playhead" onclick="seekToClick(event)">
      <div class="playhead-fill" id="ph-fill" style="width:0%"></div>
      <div class="playhead-thumb" id="ph-thumb" style="left:0%"></div>
    </div>
    <span id="footer-right">0 / 0</span>
  </footer>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════
       Shared state
    ═══════════════════════════════════════════════════════════════════════ */
    let frames = [], cur = 0, playing = false, timer = null, fps = 8, cs = 8;
    let colorMode = null, dmap = {}, cMin = 0, cMax = 1;
    let renderMode = 'grid';   // 'grid' | 'graph'
    let selectedNode = null;
    
    const canvas = document.getElementById('grid-canvas'), ctx = canvas.getContext('2d');
    const svgEl  = document.getElementById('graph-svg');

    const PAL = ["#c7d7f9",
      '#f4a7b9', '#f7c5a0', '#fde68a', '#d4f1a0', '#a8e6cf',
      '#a0d4f5', '#b5c8f9', '#c8b5f9', '#e8b5f9', '#f9b5d8',
      '#f9c9b5', '#f9e6b5', '#e6f9b5', '#b5f9c9', '#b5f9e6',
      '#b5e6f9', '#b5c9f9', '#c9b5f9', '#f9b5e6', '#f9b5c9',
      '#fbc4c4', '#fcd5b0', '#fef0b0', '#d8f0b0', '#b0f0d8',
      '#b0d8f0', '#c4c4fb', '#d8b0f0', '#f0b0d8', '#f0c4b0',
      '#e8d5f5', '#d5f5e8', '#f5e8d5', '#d5e8f5', '#f5d5e8',
      '#e8f5d5', '#f5d5d5', '#d5f5d5', '#d5d5f5', '#f5f5d5',
      '#fadadd', '#faddd5', '#faf5d5', '#d5fad5', '#d5fafa',
      '#d5d5fa', '#fad5fa', '#fad5d5', '#d5faed', '#faedd5',
      '#ffe4e1', '#ffecd5', '#fff9c4', '#e8ffc4', '#c4ffe8',
      '#c4f0ff', '#d5c4ff', '#f0c4ff', '#ffc4f0', '#ffc4d5',
    ];

    function contColor(t) {
      const stops = [[239,246,255],[219,234,254],[147,197,253],[96,165,250],[37,99,235],[29,78,216],[30,58,138]];
      const s = t*(stops.length-1), i = Math.floor(s), f = s-i;
      const a = stops[Math.min(i,stops.length-1)], b = stops[Math.min(i+1,stops.length-1)];
      return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
    }

    /* ═══════════════════════════════════════════════════════════════════════
       File loading
    ═══════════════════════════════════════════════════════════════════════ */
    ['dragover','dragleave','drop'].forEach(ev => {
      document.getElementById('drop-zone').addEventListener(ev, e => {
        e.preventDefault();
        const dz = document.getElementById('drop-zone');
        if (ev==='dragover') dz.classList.add('over');
        else if (ev==='dragleave') dz.classList.remove('over');
        else { dz.classList.remove('over'); if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); }
      });
    });
    document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

    async function readFile(f) {
      let text;
      if (f.name.endsWith('.gz')) {
        const buffer = await f.arrayBuffer();
        const stream = new DecompressionStream('gzip');
        const writer = stream.writable.getWriter();
        writer.write(buffer); writer.close();
        const out = await new Response(stream.readable).arrayBuffer();
        text = new TextDecoder().decode(out);
      } else {
        text = await f.text();
      }
      try { loadPerf(JSON.parse(text)); } catch(err) { alert('Invalid file: '+err); }
    }

    function loadPerf(data) {
      const id   = data.iteration_data || {};
      const keys = Object.keys(id).map(Number).sort((a,b) => a-b);
      if (!keys.length) { alert('No iteration_data found.'); return; }

      // ── Graph export detection ──
      if (data.type === 'graph' || id[keys[0]].graph) {
        frames = keys.map(k => id[k].graph);
        finishGraph(data, keys, id);
        return;
      }

      // ── Grid export ──
      if (!id[keys[0]].grid) { genDemo(data, keys); return; }
      frames = keys.map(k => id[k].grid);
      finishGrid(data, keys, id);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       GRID rendering  (original code, untouched)
    ═══════════════════════════════════════════════════════════════════════ */
    function genDemo(data, keys) {
      const sz = 32;
      let g = Array.from({length:sz}, () => Array.from({length:sz}, () => Math.random()>.72?1:0));
      function nx(grid){ const h=grid.length,w=grid[0].length; return grid.map((row,i)=>row.map((c,j)=>{ let n=0; for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){if(!di&&!dj)continue;n+=(grid[(i+di+h)%h][(j+dj+w)%w]||0);} return(c&&(n===2||n===3))||(!c&&n===3)?1:0; })); }
      frames = keys.map(() => { g=nx(g); return g.map(r=>[...r]); });
      finishGrid(data, keys, data.iteration_data||{});
    }

    function finishGrid(data, keys, id) {
      renderMode = 'grid';
      document.getElementById('empty-state').style.display = 'none';
      canvas.style.display = 'block';
      svgEl.style.display  = 'none';

      const sample = frames[0];
      const seen = new Set(); let hasFloat = false;
      for (const row of sample) for (const v of row) { seen.add(v); if (!hasFloat && !Number.isInteger(v)) hasFloat=true; }
      const unique = [...seen];
      if (hasFloat || seen.size>12) {
        colorMode = 'continuous'; cMin=Infinity; cMax=-Infinity;
        for (const frame of frames) for (const row of frame) for (const v of row) { if(v<cMin)cMin=v; if(v>cMax)cMax=v; }
      } else {
        colorMode = 'discrete';
        unique.sort((a,b)=>a-b).forEach((v,i)=>{ dmap[v]=PAL[i%PAL.length]; });
      }
      const h=frames[0].length, w=frames[0][0].length;
      document.getElementById('stat-iters').textContent = data.num_iterations ?? keys.length;
      document.getElementById('stat-total').textContent = data.total_time!=null ? (data.total_time*1000).toFixed(1)+'ms' : '—';
      document.getElementById('stat-per').textContent   = data.time_per_iteration!=null ? (data.time_per_iteration*1000).toFixed(2) : '—';
      document.getElementById('stat-size').textContent  = `${w}×${h}`;
      document.getElementById('footer-left').textContent = `${colorMode} · ${w}×${h}`;
      buildIterList(keys, id); buildLegend(); requestAnimationFrame(()=>goTo(0));
    }

    function buildLegend() {
      const c = document.getElementById('legend');
      if (colorMode==='continuous') {
        const stops=[0,.25,.5,.75,1].map(t=>{const[r,g,b]=contColor(t);return`rgb(${r|0},${g|0},${b|0})`;}).join(',');
        c.innerHTML=`<div class="legend-gradient" style="background:linear-gradient(90deg,${stops})"></div><div class="legend-labels"><span>${cMin.toFixed(2)}</span><span>${cMax.toFixed(2)}</span></div>`;
      } else {
        c.innerHTML=`<div class="swatches">${Object.entries(dmap).map(([v,col])=>`<div class="swatch"><div class="swatch-dot" style="background:${col}"></div><span>${v}</span></div>`).join('')}</div>`;
      }
    }

    function render(idx) {
      if (!frames[idx]) return;
      const grid=frames[idx], h=grid.length, w=grid[0].length;
      const area=document.querySelector('.canvas-area'), padding=20;
      const maxW=area.clientWidth-padding, maxH=area.clientHeight-padding;
      cs=Math.max(1,Math.floor(Math.min(maxW/w,maxH/h)));
      canvas.width=w*cs; canvas.height=h*cs;
      const img=ctx.createImageData(canvas.width,canvas.height), d=img.data;
      for(let i=0;i<h;i++) for(let j=0;j<w;j++){
        const v=grid[i][j]; let r,g,b;
        if(colorMode==='continuous'){const t=cMax>cMin?(v-cMin)/(cMax-cMin):0;[r,g,b]=contColor(Math.max(0,Math.min(1,t)));}
        else{const hex=dmap[v]??'#dbeafe';r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);}
        for(let py=0;py<cs;py++) for(let px=0;px<cs;px++){const o=((i*cs+py)*canvas.width+(j*cs+px))*4;d[o]=r;d[o+1]=g;d[o+2]=b;d[o+3]=255;}
      }
      ctx.putImageData(img,0,0);
      if(cs>=6){
        ctx.strokeStyle='rgba(203,213,225,0.45)';ctx.lineWidth=0.5;
        for(let i=0;i<=h;i++){ctx.beginPath();ctx.moveTo(0,i*cs);ctx.lineTo(canvas.width,i*cs);ctx.stroke();}
        for(let j=0;j<=w;j++){ctx.beginPath();ctx.moveTo(j*cs,0);ctx.lineTo(j*cs,canvas.height);ctx.stroke();}
      }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       GRAPH rendering  (force-directed SVG)
    ═══════════════════════════════════════════════════════════════════════ */
    let gPositions = [];   // [{x,y}] – per-node pixel positions, stable across frames
    let gSimHandle = null; // requestAnimationFrame handle for force layout

    const NS = 'http://www.w3.org/2000/svg';

    function finishGraph(data, keys, id) {
      renderMode = 'graph';
      selectedNode = null;
      document.getElementById('empty-state').style.display = 'none';
      canvas.style.display = 'none';
      svgEl.style.display  = 'block';

      // Determine colorMode from node_states across all frames
      const allStates = frames.flatMap(f => f.node_states || []);
      const seen = new Set(allStates); let hasFloat = false;
      for (const v of allStates) if (!Number.isInteger(v)) { hasFloat=true; break; }
      if (hasFloat || seen.size > 12) {
        colorMode = 'continuous';
        cMin = Math.min(...allStates); cMax = Math.max(...allStates);
      } else {
        colorMode = 'discrete';
        [...seen].sort((a,b)=>a-b).forEach((v,i) => { dmap[v]=PAL[i%PAL.length]; });
      }

      const N = frames[0].num_nodes;
      document.getElementById('stat-iters').textContent = data.num_iterations ?? keys.length;
      document.getElementById('stat-total').textContent = data.total_time!=null ? (data.total_time*1000).toFixed(1)+'ms' : '—';
      document.getElementById('stat-per').textContent   = data.time_per_iteration!=null ? (data.time_per_iteration*1000).toFixed(2) : '—';
      document.getElementById('stat-size').textContent  = `${N} nodes`;
      document.getElementById('footer-left').textContent = `graph · ${N} nodes`;

      // Use embedded positions if available, else lay out in a circle
      initNodePositions(frames[0], N);

      // If no fixed positions → run brief force simulation on first frame
      if (!frames[0].positions) {
        runForceLayout(frames[0], N, 120, () => {
          buildIterList(keys, id); buildLegend(); requestAnimationFrame(()=>goTo(0));
        });
      } else {
        buildIterList(keys, id); buildLegend(); requestAnimationFrame(()=>goTo(0));
      }
    }

    function initNodePositions(frame, N) {
      const area = document.querySelector('.canvas-area');
      const W = area.clientWidth, H = area.clientHeight;
      gPositions = [];

      if (frame.positions) {
        // Embedded positions are normalised to [-1, 1] – map to canvas
        const pad = 60;
        for (let i = 0; i < N; i++) {
          const p = frame.positions[String(i)] || [0, 0];
          gPositions.push({
            x: ((p[0]+1)/2) * (W - 2*pad) + pad,
            y: ((p[1]+1)/2) * (H - 2*pad) + pad,
          });
        }
      } else {
        // Circle layout
        const cx=W/2, cy=H/2, r=Math.min(W,H)*0.38;
        for (let i=0; i<N; i++) {
          gPositions.push({
            x: cx + r*Math.cos(2*Math.PI*i/N - Math.PI/2),
            y: cy + r*Math.sin(2*Math.PI*i/N - Math.PI/2),
            vx: 0, vy: 0,
          });
        }
      }
    }

    function runForceLayout(frame, N, ticks, done) {
      const area = document.querySelector('.canvas-area');
      const W = area.clientWidth, H = area.clientHeight;
      const edges = frame.edges || [];
      let t = 0;

      function tick() {
        // Repulsion
        for (let i=0; i<N; i++) for (let j=i+1; j<N; j++) {
          const dx=gPositions[j].x-gPositions[i].x, dy=gPositions[j].y-gPositions[i].y;
          const dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));
          const f=2000/(dist*dist);
          gPositions[i].vx-=f*dx/dist; gPositions[i].vy-=f*dy/dist;
          gPositions[j].vx+=f*dx/dist; gPositions[j].vy+=f*dy/dist;
        }
        // Attraction along edges
        for (const [u,v] of edges) {
          const dx=gPositions[v].x-gPositions[u].x, dy=gPositions[v].y-gPositions[u].y;
          const dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));
          const f=(dist-120)*0.04;
          gPositions[u].vx+=f*dx/dist; gPositions[u].vy+=f*dy/dist;
          gPositions[v].vx-=f*dx/dist; gPositions[v].vy-=f*dy/dist;
        }
        // Centre gravity
        const cx=W/2, cy=H/2;
        for (const p of gPositions) { p.vx+=(cx-p.x)*0.01; p.vy+=(cy-p.y)*0.01; }
        // Integrate + damp + clamp
        const pad=40;
        for (const p of gPositions) {
          p.vx*=0.85; p.vy*=0.85;
          p.x=Math.max(pad,Math.min(W-pad,p.x+p.vx));
          p.y=Math.max(pad,Math.min(H-pad,p.y+p.vy));
        }
        t++;
        if (t < ticks) { gSimHandle=requestAnimationFrame(tick); }
        else { done(); }
      }
      gSimHandle = requestAnimationFrame(tick);
    }

    function nodeColor(state) {
      if (colorMode==='continuous') {
        const t = cMax>cMin ? (state-cMin)/(cMax-cMin) : 0;
        const [r,g,b] = contColor(Math.max(0,Math.min(1,t)));
        return `rgb(${r|0},${g|0},${b|0})`;
      }
      return dmap[state] ?? '#dbeafe';
    }
    function renderGraph(idx) {
      if (!frames[idx]) return;
      const frame  = frames[idx];
      const N      = frame.num_nodes;
      const edges  = frame.edges  || [];
      const states = frame.node_states || Array(N).fill(0);
      const area   = document.querySelector('.canvas-area');
      const W = area.clientWidth, H = area.clientHeight;

      svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svgEl.setAttribute('width',  W);
      svgEl.setAttribute('height', H);
      svgEl.innerHTML = '';

      const NS = 'http://www.w3.org/2000/svg';

      // Arrow marker (normal)
      const defs = document.createElementNS(NS,'defs');
      const marker = document.createElementNS(NS,'marker');
      marker.setAttribute('id','arr'); marker.setAttribute('markerWidth','7');
      marker.setAttribute('markerHeight','7'); marker.setAttribute('refX','5');
      marker.setAttribute('refY','3.5'); marker.setAttribute('orient','auto');
      const path = document.createElementNS(NS,'path');
      path.setAttribute('d','M0,0 L0,7 L7,3.5 z');
      path.setAttribute('fill','#94a3b8');
      marker.appendChild(path); defs.appendChild(marker); svgEl.appendChild(defs);

      // Normal edges (drawn first)
      const edgeG = document.createElementNS(NS,'g');
      for (const [u,v,w] of edges) {
        if (u >= N || v >= N) continue;
        const pu = gPositions[u], pv = gPositions[v];
        const line = document.createElementNS(NS,'line');
        line.setAttribute('x1', pu.x.toFixed(1));
        line.setAttribute('y1', pu.y.toFixed(1));
        line.setAttribute('x2', pv.x.toFixed(1));
        line.setAttribute('y2', pv.y.toFixed(1));
        line.setAttribute('stroke', '#cbd5e1');
        line.setAttribute('stroke-width', Math.max(0.8, Math.min(3, (w||1)*1.5)).toFixed(1));
        line.setAttribute('marker-end','url(#arr)');
        edgeG.appendChild(line);
      }
      svgEl.appendChild(edgeG);

      // Selected node + highlighted outgoing edges (drawn last = on top)
      const nodeG = document.createElementNS(NS,'g');
      const R = Math.max(8, Math.min(18, 200/Math.sqrt(N)));

      for (let i = 0; i < N; i++) {
        const p = gPositions[i];
        const gNode = document.createElementNS(NS,'g');
        gNode.setAttribute('class','g-node');
        gNode.setAttribute('transform', `translate(${p.x.toFixed(1)},${p.y.toFixed(1)})`);

        const isSelected = (i === selectedNode);
        const baseR = isSelected ? R * 1.68 : R;

        const circ = document.createElementNS(NS,'circle');
        circ.setAttribute('r', baseR);
        circ.setAttribute('fill', nodeColor(states[i]));
        if (isSelected) {
          circ.setAttribute('stroke', '#1e40af');
          circ.setAttribute('stroke-width', '4');
        }
        gNode.appendChild(circ);

        const lbl = document.createElementNS(NS,'text');
        lbl.textContent = i;
        gNode.appendChild(lbl);

        // Hover (grows even more on selected node)
        gNode.addEventListener('mouseenter', () => {
          const hoverR = isSelected ? baseR * 1.25 : R * 1.38;
          circ.setAttribute('r', hoverR.toFixed(1));
        });
        gNode.addEventListener('mouseleave', () => {
          circ.setAttribute('r', baseR.toFixed(1));
        });

        // Click = toggle selection
        gNode.addEventListener('click', (e) => {
          e.stopImmediatePropagation();
          selectedNode = (selectedNode === i) ? null : i;
          renderGraph(cur);
        });

        nodeG.appendChild(gNode);
      }
      svgEl.appendChild(nodeG);

      // Highlighted outgoing edges (on top)
      if (selectedNode !== null) {
        const hlG = document.createElementNS(NS,'g');
        for (const [u,v,w] of edges) {
          if (u === selectedNode && u < N && v < N) {
            const pu = gPositions[u], pv = gPositions[v];
            const line = document.createElementNS(NS,'line');
            line.setAttribute('x1', pu.x.toFixed(1));
            line.setAttribute('y1', pu.y.toFixed(1));
            line.setAttribute('x2', pv.x.toFixed(1));
            line.setAttribute('y2', pv.y.toFixed(1));
            line.setAttribute('stroke', '#2563eb');
            line.setAttribute('stroke-width', Math.max(3, Math.min(6.5, (w||1)*2.8)).toFixed(1));
            line.setAttribute('stroke-opacity', '0.98');
            line.setAttribute('marker-end','url(#arr)');
            hlG.appendChild(line);
          }
        }
        svgEl.appendChild(hlG);
      }

      // Background click → deselect
      svgEl.addEventListener('click', (e) => {
        if (e.target === svgEl) {
          selectedNode = null;
          renderGraph(cur);
        }
      }, { once: true });
    }
    /* ═══════════════════════════════════════════════════════════════════════
       Shared playback helpers
    ═══════════════════════════════════════════════════════════════════════ */
    function buildIterList(keys, id) {
      const maxT = Math.max(...keys.map(k => id[k]?.time || 0));
      const list  = document.getElementById('iter-list'); list.innerHTML='';
      keys.forEach(k => {
        const t=id[k]?.time??0, el=document.createElement('div');
        el.className='iter-item'; el.dataset.iter=k;
        el.innerHTML=`<span class="iter-num">${k}</span><div class="iter-bar-track"><div class="iter-bar" style="width:${maxT>0?(t/maxT*100).toFixed(1):50}%"></div></div><span class="iter-time">${(t*1000).toFixed(2)}ms</span>`;
        el.addEventListener('click', ()=>goTo(k));
        list.appendChild(el);
      });
    }

    function goTo(idx) {
      if (!frames.length) return;
      cur = Math.max(0, Math.min(frames.length-1, idx));
      if (renderMode==='graph') renderGraph(cur); else render(cur);
      const pct = frames.length>1 ? cur/(frames.length-1)*100 : 0;
      document.getElementById('ph-fill').style.width  = pct+'%';
      document.getElementById('ph-thumb').style.left  = pct+'%';
      document.getElementById('footer-right').textContent = `${cur} / ${frames.length-1}`;
      document.querySelectorAll('.iter-item').forEach(el=>el.classList.toggle('active',+el.dataset.iter===cur));
      document.querySelector('.iter-item.active')?.scrollIntoView({block:'nearest'});
    }

    function stepBy(d) { goTo(cur+d); }
    function seekToClick(e) {
      if (!frames.length) return;
      const r=document.getElementById('playhead').getBoundingClientRect();
      goTo(Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*(frames.length-1)));
    }
    function togglePlay() {
      if (!frames.length) return;
      playing=!playing;
      const btn=document.getElementById('btn-play');
      if (playing) {
        btn.textContent='⏸ Pause';
        if (cur>=frames.length-1) goTo(0);
        timer=setInterval(()=>{ if(cur>=frames.length-1){stopPlay();return;} stepBy(1); },1000/fps);
      } else stopPlay();
    }
    function stopPlay() { playing=false; clearInterval(timer); document.getElementById('btn-play').textContent='▶ Play'; }
    function setSpeed(v) { fps=+v; document.getElementById('speed-label').textContent=v+' fps'; if(playing){stopPlay();togglePlay();} }
    function reset() { stopPlay(); goTo(0); }
    window.addEventListener('resize', () => {
      if (!frames.length) return;
      if (renderMode==='graph') { initNodePositions(frames[0], frames[0].num_nodes); renderGraph(cur); }
      else render(cur);
    });
  </script>
</body>
